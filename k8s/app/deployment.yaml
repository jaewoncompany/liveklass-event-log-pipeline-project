apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-generator
  namespace: event-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-generator
  template:
    metadata:
      labels:
        app: event-generator
    spec:
      containers:
        - name: event-generator
          image: event-generator:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: event-pipeline-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: event-pipeline-secret
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: output
              mountPath: /output
      volumes:
        - name: output
          emptyDir: {}
