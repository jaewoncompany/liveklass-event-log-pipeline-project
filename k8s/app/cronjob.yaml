apiVersion: batch/v1
kind: CronJob
metadata:
  name: event-generator-cronjob
  namespace: event-pipeline
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: event-generator
              image: event-generator:latest
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: event-pipeline-config
              env:
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: event-pipeline-secret
                      key: DB_PASSWORD
              volumeMounts:
                - name: output
                  mountPath: /output
          volumes:
            - name: output
              emptyDir: {}
